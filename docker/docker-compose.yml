services:
  postgres:
    image: postgres:17-alpine
    container_name: cloudnativepayments-postgres
    environment:
      POSTGRES_DB: cloud_native_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_native_payments"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v25.1.1
    container_name: cloudnativepayments-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 20

  redpanda-console:
    image: redpandadata/console:v2.8.4
    container_name: cloudnativepayments-kafka-ui
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

  topic-init:
    image: redpandadata/redpanda:v25.1.1
    container_name: cloudnativepayments-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "rpk topic create orders.order-created --brokers redpanda:29092 || true"

volumes:
  postgres-data:
